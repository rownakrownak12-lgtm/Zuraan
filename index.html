<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuraan | Signature Scents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #fff; }
        .brand-font { font-family: 'Cinzel', serif; }
        
        .product-card { transition: 0.3s; border-radius: 1.2rem; border: 1px solid #eee; background: #fff; display: flex; flex-direction: column; height: 100%; position: relative; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        /* নাম পুরোপুরি দেখানোর জন্য ফিক্স */
        .product-title-area {
            min-height: 4.5rem; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            margin-bottom: 5px;
        }
        .full-name {
            display: block !important;
            overflow: visible !important;
            white-space: normal !important;
            line-height: 1.2;
            text-align: center;
            text-transform: uppercase;
        }

        /* কম্বো ব্যাজের স্টাইল */
        .combo-badge {
            background: #C5A059;
            color: white;
            font-size: 8px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 4px;
            display: inline-block;
        }

        .gold-btn { background: #0A0A0A; color: white; border-radius: 0.6rem; cursor: pointer; border: none; transition: 0.3s; }
        .gold-btn:hover { background: #C5A059; }
        .details-btn { border: 1px solid #0A0A0A; color: #0A0A0A; border-radius: 0.6rem; background: transparent; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 top-0 bg-white/90 border-b py-3">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <span class="brand-font text-xl md:text-2xl font-bold">ZURAAN</span>
            <div class="flex space-x-4 text-xl">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </nav>

    <header class="pt-28 pb-10 text-center bg-[#fdfcfb]">
        <h1 class="brand-font text-5xl md:text-7xl font-bold uppercase">ZURAAN</h1>
        <p class="brand-font text-amber-700 tracking-[0.2em] text-[10px] md:text-xs uppercase italic">Premium Perfume Collection</p>
    </header>

    <main class="container mx-auto px-2 md:px-8 py-8">
        <div id="product-list" class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-8">
            <p class="text-center col-span-full py-20 text-gray-400">Syncing Collection...</p>
        </div>
    </main>

    <script>
        const MY_NUMBER = "8801876395185"; 
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSPO-no79a_tO4Kxqg-BxwLtn4Hp8AopALY87ht3IVldUlM2OGGzZg5sMWhoD8E6WAoaHHJKptNmeMz/pub?output=csv";

        async function fetchProducts() {
            try {
                const res = await fetch(`${SHEET_CSV_URL}&cb=${Date.now()}`);
                const csv = await res.text();
                const rows = csv.split(/\r?\n/).map(row => {
                    return row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g)?.map(v => v.replace(/^"|"$/g, '').trim());
                }).filter(r => r && r.length >= 4);

                const headers = rows[0].map(h => h.toLowerCase().trim());
                const items = rows.slice(1);
                const list = document.getElementById('product-list');
                list.innerHTML = ''; 

                items.forEach(item => {
                    const get = (n) => item[headers.indexOf(n)] || "";
                    const name = get('name');
                    const price = get('price');
                    const img = get('imgurl');

                    // চেক করা হচ্ছে নামের মধ্যে "Combo" লেখা আছে কি না
                    const isCombo = name.toLowerCase().includes("combo");

                    if(name) {
                        list.innerHTML += `
                            <div class="product-card p-2 md:p-4">
                                <div class="h-40 md:h-72 overflow-hidden rounded-lg bg-gray-50 mb-4">
                                    <img src="${img}" class="w-full h-full object-cover">
                                </div>
                                <div class="product-title-area">
                                    <h3 class="brand-font text-[12px] md:text-lg font-bold full-name">${name}</h3>
                                    ${isCombo ? '<span class="combo-badge">COMBO PACK</span>' : ''}
                                </div>
                                <p class="text-amber-700 font-bold text-sm md:text-xl text-center mb-4">${price} TK</p>
                                <div class="grid grid-cols-2 gap-2 mt-auto">
                                    <button class="details-btn py-2 text-[8px] md:text-[10px] font-bold">DETAILS</button>
                                    <button class="gold-btn py-2 text-[8px] md:text-[10px] font-bold">BUY</button>
                                </div>
                            </div>
                        `;
                    }
                });
            } catch (e) { console.error(e); }
        }
        window.onload = fetchProducts;
    </script>
</body>
</html>
