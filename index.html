<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuraan | Signature Scents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .brand-font { font-family: 'Cinzel', serif; }
        .product-card { transition: 0.4s; border-radius: 2.5rem; overflow: hidden; border: 1px solid #f3f4f6; background: #fff; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px -12px rgba(0,0,0,0.1); border-color: #C5A059; }
        .gold-btn { background: #0A0A0A; color: white; transition: 0.3s; border-radius: 1.2rem; text-align: center; cursor: pointer; }
        .gold-btn:hover { background: #C5A059; }
        /* Modal Style */
        #orderModal { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="bg-white">

    <nav class="fixed w-full z-50 top-0 bg-white/90 backdrop-blur-md border-b">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="./logo.png" class="h-10 w-10 rounded-full border" onerror="this.src='https://via.placeholder.com/40';">
                <span class="brand-font text-2xl font-bold tracking-tighter">ZURAAN</span>
            </div>
            <div class="flex space-x-5 text-xl">
                <a href="https://www.facebook.com/share/19vbLoMpfF/" target="_blank"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/zuraan_fragrance" target="_blank"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </nav>

    <header class="pt-48 pb-20 text-center bg-[#fdfcfb]">
        <h1 class="brand-font text-6xl md:text-8xl font-bold mb-4">ZURAAN</h1>
        <p class="brand-font text-amber-700 tracking-[0.3em] uppercase text-sm">Luxury Collection</p>
    </header>

    <section class="py-24 container mx-auto px-6">
        <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12">
            <p class="text-center col-span-full py-20 text-gray-400 animate-pulse">Loading Collection...</p>
        </div>
    </section>

    <div id="orderModal" class="fixed inset-0 z-[100] hidden bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-black text-2xl">&times;</button>
            <h2 class="brand-font text-2xl mb-6 border-b pb-4">Order Summary</h2>
            <div id="modalContent" class="space-y-4 text-gray-700">
                </div>
            <button id="confirmOrderBtn" class="gold-btn w-full py-4 mt-8 font-bold uppercase tracking-widest">Confirm via WhatsApp</button>
        </div>
    </div>

    <footer class="bg-zinc-950 text-white py-10 text-center">
        <p class="text-[10px] text-gray-500 uppercase tracking-widest">© 2026 Zuraan Luxury | Developed by Rownak</p>
    </footer>

    <script>
        const MY_NUMBER = "8801876395185"; 
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSPO-no79a_tO4Kxqg-BxwLtn4Hp8AopALY87ht3IVldUlM2OGGzZg5sMWhoD8E6WAoaHHJKptNmeMz/pub?output=csv";

        let currentOrder = null;

        async function fetchProducts() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1).filter(r => r.trim() !== '');
                const list = document.getElementById('product-list');
                list.innerHTML = ''; 

                rows.forEach(row => {
                    const col = row.split(',').map(c => c.trim().replace(/^"(.*)"$/, '$1'));
                    if(col.length >= 5) {
                        let [id, name, price, delivery, imgUrl] = col;
                        let finalImg = imgUrl.includes("ibb.co") && !imgUrl.includes("i.ibb.co") 
                                       ? `https://i.ibb.co/${imgUrl.split('/').pop()}/image.jpg` : imgUrl;

                        list.innerHTML += `
                            <div class="product-card">
                                <div class="h-80 overflow-hidden bg-gray-50">
                                    <img src="${finalImg}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x500';">
                                </div>
                                <div class="p-8 text-center">
                                    <h3 class="brand-font text-xl font-bold mb-2">${name}</h3>
                                    <p class="text-amber-700 font-black text-2xl mb-6">${price} TK</p>
                                    <button onclick="openModal('${name}', ${price}, ${delivery})" class="gold-btn w-full py-4 font-bold text-[10px] uppercase tracking-widest">Purchase Now</button>
                                </div>
                            </div>
                        `;
                    }
                });
            } catch (e) { console.error(e); }
        }

        function openModal(name, price, delivery) {
            const total = price + delivery;
            currentOrder = { name, price, delivery, total };
            
            document.getElementById('modalContent').innerHTML = `
                <div class="flex justify-between"><span>Product:</span><span class="font-bold">${name}</span></div>
                <div class="flex justify-between"><span>Price:</span><span>${price} TK</span></div>
                <div class="flex justify-between text-red-500"><span>Delivery:</span><span>+ ${delivery} TK</span></div>
                <div class="flex justify-between border-t pt-4 text-xl font-black text-amber-700">
                    <span>Total Cost:</span><span>${total} TK</span>
                </div>
            `;
            
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.add('hidden');
        }

        document.getElementById('confirmOrderBtn').onclick = function() {
            if(!currentOrder) return;
            const msg = encodeURIComponent(
                `New Order - ZURAAN\n` +
                `--------------------------\n` +
                `Product: ${currentOrder.name}\n` +
                `Price: ${currentOrder.price} TK\n` +
                `Delivery: ${currentOrder.delivery} TK\n` +
                `Total: ${currentOrder.total} TK`
            );
            window.open(`https://wa.me/${MY_NUMBER}?text=${msg}`, '_blank');
            closeModal();
        };

        fetchProducts();
    </script>
</body>
</html>
