<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuraan | Signature Scents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .brand-font { font-family: 'Cinzel', serif; }
        
        /* Card Styling */
        .product-card { transition: 0.4s; border-radius: 1.5rem; overflow: hidden; border: 1px solid #f3f4f6; background: #fff; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.08); border-color: #C5A059; }
        
        /* Buttons */
        .gold-btn { background: #0A0A0A; color: white; transition: 0.3s; border-radius: 0.8rem; text-align: center; cursor: pointer; }
        .gold-btn:hover { background: #C5A059; }
        .details-btn { border: 1px solid #0A0A0A; color: #0A0A0A; transition: 0.3s; border-radius: 0.8rem; text-align: center; cursor: pointer; }
        
        #orderModal { backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-white">

    <nav class="fixed w-full z-50 top-0 bg-white/80 backdrop-blur-md border-b">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <img src="./logo.png" class="h-8 md:h-10 w-8 md:w-10 rounded-full border" onerror="this.src='https://via.placeholder.com/40';">
                <span class="brand-font text-lg md:text-2xl font-bold tracking-tighter uppercase">ZURAAN</span>
            </div>
            <div class="flex space-x-4 text-lg text-black">
                <a href="https://www.facebook.com/share/19vbLoMpfF/" target="_blank"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/zuraan_fragrance" target="_blank"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </nav>

    <header class="pt-32 pb-12 md:pt-48 md:pb-24 text-center bg-[#fdfcfb] px-4">
        <h1 class="brand-font text-5xl md:text-8xl font-bold mb-2 tracking-tight uppercase">Zuraan</h1>
        <p class="brand-font text-amber-700 tracking-[0.2em] md:tracking-[0.4em] uppercase italic text-[9px] md:text-xs text-center">Luxury Performance Fragrance</p>
    </header>

    <section class="py-12 md:py-24 container mx-auto px-2 md:px-8">
        <div id="product-list" class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-12">
            <p class="text-center col-span-full py-20 text-gray-400">Syncing Collection...</p>
        </div>
    </section>

    <div id="orderModal" class="fixed inset-0 z-[100] hidden bg-black/70 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm md:max-w-md rounded-[2rem] p-6 md:p-10 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-300 hover:text-black text-3xl">&times;</button>
            <h2 id="modalTitle" class="brand-font text-xl md:text-2xl mb-4 border-b pb-4">Details</h2>
            <div id="modalContent" class="space-y-4 text-gray-700 text-xs md:text-base"></div>
            <div id="modalActions" class="mt-8">
                <button id="confirmOrderBtn" class="gold-btn w-full py-4 md:py-5 font-bold uppercase tracking-widest text-[10px] md:text-xs">Order Now</button>
            </div>
        </div>
    </div>

    <footer class="bg-zinc-950 text-white py-12 text-center mt-20">
        <p class="text-[9px] text-zinc-600 uppercase tracking-widest italic">© 2026 Zuraan Luxury Fragrance</p>
    </footer>

    <script>
        const MY_NUMBER = "8801876395185"; 
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSPO-no79a_tO4Kxqg-BxwLtn4Hp8AopALY87ht3IVldUlM2OGGzZg5sMWhoD8E6WAoaHHJKptNmeMz/pub?output=csv";

        let currentOrderData = null;

        async function fetchProducts() {
            try {
                // cachebust: To force browser to fetch latest price from Google Sheet
                const response = await fetch(SHEET_CSV_URL + "&cb=" + new Date().getTime());
                const csvData = await response.text();
                const lines = csvData.split('\n').filter(l => l.trim() !== '');
                
                const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
                const rows = lines.slice(1);
                
                const list = document.getElementById('product-list');
                list.innerHTML = ''; 

                rows.forEach(row => {
                    const col = row.split(',').map(c => c.trim().replace(/^"(.*)"$/, '$1'));
                    const getCol = (name) => col[headers.indexOf(name)] || "";
                    
                    const name = getCol('name');
                    const price = getCol('price');
                    const delivery = getCol('delivery');
                    const imgUrl = getCol('imgurl');
                    const details = getCol('details');

                    let finalImg = imgUrl;
                    if(imgUrl.includes("ibb.co") && !imgUrl.includes("i.ibb.co")) {
                        finalImg = `https://i.ibb.co/${imgUrl.split('/').pop()}/image.jpg`;
                    }

                    if(name) {
                        list.innerHTML += `
                            <div class="product-card">
                                <div class="h-48 md:h-80 overflow-hidden bg-gray-50">
                                    <img src="${finalImg}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x500?text=Zuraan';">
                                </div>
                                <div class="p-3 md:p-8 text-center">
                                    <h3 class="brand-font text-[12px] md:text-xl font-bold mb-1 uppercase line-clamp-1">${name}</h3>
                                    <p class="text-amber-700 font-black text-sm md:text-2xl mb-4">${price} TK</p>
                                    <div class="grid grid-cols-2 gap-1.5 md:gap-2">
                                        <button onclick="showDetails('${name}', '${details.replace(/'/g, "\\'")}')" class="details-btn py-2 md:py-3 text-[7px] md:text-[9px] font-bold uppercase tracking-widest">Details</button>
                                        <button onclick="openOrderModal('${name}', ${price}, ${delivery})" class="gold-btn py-2 md:py-3 text-[7px] md:text-[9px] font-bold uppercase tracking-widest">Purchase</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });
            } catch (e) { console.error(e); }
        }

        function showDetails(name, info) {
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalContent').innerHTML = `<p class="italic text-gray-600 text-center">"${info || 'Zuraan Signature Collection'}"</p>`;
            document.getElementById('confirmOrderBtn').classList.add('hidden');
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function openOrderModal(name, price, delivery) {
            const total = parseInt(price) + parseInt(delivery);
            currentOrderData = { name, price, delivery, total };
            document.getElementById('modalTitle').innerText = "Summary";
            document.getElementById('modalContent').innerHTML = `
                <div class="flex justify-between py-1"><span>Price:</span><b>${price} TK</b></div>
                <div class="flex justify-between py-1"><span>Delivery:</span><b>${delivery} TK</b></div>
                <div class="flex justify-between text-lg border-t pt-4 mt-2 font-black text-amber-700"><span>Total:</span><span>${total} TK</span></div>
            `;
            document.getElementById('confirmOrderBtn').classList.remove('hidden');
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('orderModal').classList.add('hidden'); }

        document.getElementById('confirmOrderBtn').onclick = function() {
            const msg = encodeURIComponent(`ORDER: ${currentOrderData.name}\nTotal: ${currentOrderData.total} TK`);
            window.open(`https://wa.me/${MY_NUMBER}?text=${msg}`, '_blank');
        };

        fetchProducts();
    </script>
</body>
</html>
