<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuraan | Luxury Scents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; }
        .brand-font { font-family: 'Cinzel', serif; }
        
        .product-card { transition: 0.3s; border-radius: 1rem; overflow: hidden; border: 1px solid #eee; background: #fff; height: 100%; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); border-color: #C5A059; }
        
        .gold-btn { background: #0A0A0A; color: white; border-radius: 0.5rem; transition: 0.3s; border: none; cursor: pointer; }
        .gold-btn:hover { background: #C5A059; }
        .details-btn { border: 1px solid #0A0A0A; color: #0A0A0A; border-radius: 0.5rem; transition: 0.3s; background: transparent; cursor: pointer; }
        
        #universalModal { backdrop-filter: blur(15px); }
        
        /* নাম পুরোপুরি দেখানোর জন্য এই স্টাইলটি যোগ করা হয়েছে */
        .product-title { 
            display: block; 
            min-height: 2.5em; /* অন্তত দুই লাইন জায়গা রাখবে */
            line-height: 1.2;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 top-0 bg-white/90 border-b">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <img src="./logo.png" class="h-8 md:h-10 rounded-full" onerror="this.src='https://via.placeholder.com/40';">
                <span class="brand-font text-xl md:text-2xl font-bold">ZURAAN</span>
            </div>
            <div class="flex space-x-4 text-xl">
                <a href="https://www.facebook.com/share/19vbLoMpfF/" target="_blank"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/zuraan_fragrance" target="_blank"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </nav>

    <header class="pt-32 pb-10 text-center bg-[#fdfcfb]">
        <h1 class="brand-font text-5xl md:text-7xl font-bold uppercase">ZURAAN</h1>
        <p class="brand-font text-amber-700 tracking-[0.2em] text-[10px] md:text-xs uppercase italic px-4">Signature Performance Fragrance</p>
    </header>

    <main class="container mx-auto px-2 md:px-8 py-8">
        <div id="product-list" class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-8">
            <p class="text-center col-span-full py-20 text-gray-400">Loading Collection...</p>
        </div>
    </main>

    <div id="universalModal" class="fixed inset-0 z-[100] hidden bg-black/70 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[1.5rem] p-6 md:p-8 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 text-3xl">&times;</button>
            <h2 id="modalTitle" class="brand-font text-xl mb-4 border-b pb-2"></h2>
            <div id="modalContent" class="text-gray-700 text-sm leading-relaxed mb-6"></div>
            <button id="modalActionBtn" class="gold-btn w-full py-4 font-bold uppercase tracking-widest text-xs"></button>
        </div>
    </div>

    <footer class="bg-black text-white py-10 text-center mt-10">
        <p class="text-[9px] text-gray-500 uppercase tracking-widest italic">© 2026 Zuraan Luxury Fragrance | Bangladesh</p>
    </footer>

    <script>
        const MY_NUMBER = "8801876395185"; 
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSPO-no79a_tO4Kxqg-BxwLtn4Hp8AopALY87ht3IVldUlM2OGGzZg5sMWhoD8E6WAoaHHJKptNmeMz/pub?output=csv";

        let orderDetails = null;

        async function fetchProducts() {
            try {
                // Fresh data fetch with cache busting
                const response = await fetch(`${SHEET_CSV_URL}&cb=${new Date().getTime()}`);
                const data = await response.text();
                
                const rows = data.split(/\r?\n/).map(row => {
                    const matches = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    return matches ? matches.map(val => val.replace(/^"|"$/g, '').trim()) : null;
                }).filter(r => r && r.length >= 4);

                const headers = rows[0].map(h => h.toLowerCase().trim());
                const items = rows.slice(1);
                
                const list = document.getElementById('product-list');
                list.innerHTML = ''; 

                items.forEach(item => {
                    const getVal = (name) => item[headers.indexOf(name)] || "";
                    const name = getVal('name');
                    const price = getVal('price');
                    const delivery = getVal('delivery');
                    const imgUrl = getVal('imgurl');
                    const details = getVal('details');

                    let finalImg = imgUrl;
                    if(imgUrl.includes("ibb.co") && !imgUrl.includes("i.ibb.co")) {
                        finalImg = `https://i.ibb.co/${imgUrl.split('/').pop()}/image.jpg`;
                    }

                    if(name) {
                        list.innerHTML += `
                            <div class="product-card">
                                <div class="h-44 md:h-72 overflow-hidden bg-gray-50">
                                    <img src="${finalImg}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400?text=Zuraan';">
                                </div>
                                <div class="p-3 md:p-6 flex-grow flex flex-col justify-between">
                                    <div class="text-center mb-3">
                                        <h3 class="brand-font text-[11px] md:text-lg font-bold uppercase product-title">${name}</h3>
                                        <p class="text-amber-700 font-bold text-sm md:text-xl">${price} TK</p>
                                    </div>
                                    <div class="grid grid-cols-2 gap-1.5 md:gap-2">
                                        <button onclick="openDetails(\`${name}\`, \`${details}\`)" class="details-btn py-2 text-[7px] md:text-[10px] font-bold uppercase">Details</button>
                                        <button onclick="openOrder(\`${name}\`, ${price}, ${delivery})" class="gold-btn py-2 text-[7px] md:text-[10px] font-bold uppercase">Buy Now</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });
            } catch (err) {
                document.getElementById('product-list').innerHTML = "<p class='col-span-full text-center'>Refreshing Collection...</p>";
            }
        }

        function openDetails(name, info) {
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalContent').innerText = info || "Premium Fragrance by Zuraan.";
            const btn = document.getElementById('modalActionBtn');
            btn.innerText = "Close";
            btn.onclick = closeModal;
            document.getElementById('universalModal').classList.remove('hidden');
        }

        function openOrder(name, price, delivery) {
            const total = parseInt(price) + parseInt(delivery);
            orderDetails = { name, total };
            document.getElementById('modalTitle').innerText = "Order Summary";
            document.getElementById('modalContent').innerHTML = `
                <div class="space-y-2 py-4 border-t border-gray-100">
                    <div class="flex justify-between text-xs"><span>Price:</span><span>${price} TK</span></div>
                    <div class="flex justify-between text-xs text-red-500"><span>Delivery:</span><span>+ ${delivery} TK</span></div>
                    <div class="flex justify-between font-bold text-xl border-t pt-4 text-amber-700"><span>Total:</span><span>${total} TK</span></div>
                </div>
            `;
            const btn = document.getElementById('modalActionBtn');
            btn.innerText = "Order via WhatsApp";
            btn.onclick = () => window.open(`https://wa.me/${MY_NUMBER}?text=${encodeURIComponent('I want to order: ' + name + '\nTotal: ' + total + ' TK')}`, '_blank');
            document.getElementById('universalModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('universalModal').classList.add('hidden'); }

        window.onload = fetchProducts;
    </script>
</body>
</html>
