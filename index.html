<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuraan | Signature Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #1a1a1a; }
        .brand-font { font-family: 'Cinzel', serif; }
        
        /* Product Card Fixes */
        .product-card { transition: 0.3s; border-radius: 1.2rem; overflow: hidden; border: 1px solid #eee; background: #fff; height: 100%; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); border-color: #C5A059; }
        
        /* Buttons */
        .gold-btn { background: #0A0A0A; color: white; border-radius: 0.6rem; transition: 0.3s; cursor: pointer; border: none; }
        .gold-btn:hover { background: #C5A059; }
        .details-btn { border: 1px solid #0A0A0A; color: #0A0A0A; border-radius: 0.6rem; transition: 0.3s; background: transparent; cursor: pointer; }

        /* নাম পুরোপুরি দেখানোর জন্য ফিক্স */
        .product-name { 
            min-height: 3rem; /* নাম ছোট হলেও ২ লাইনের জায়গা ফাঁকা রাখবে */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible; 
            text-overflow: unset;
            white-space: normal;
        }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 top-0 bg-white/90 backdrop-blur-md border-b">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <img src="./logo.png" class="h-8 md:h-10 rounded-full" onerror="this.src='https://via.placeholder.com/40';">
                <span class="brand-font text-xl md:text-2xl font-bold">ZURAAN</span>
            </div>
            <div class="flex space-x-4 text-xl">
                <a href="https://www.facebook.com/share/19vbLoMpfF/" target="_blank"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/zuraan_fragrance" target="_blank"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </nav>

    <header class="pt-28 pb-12 text-center bg-[#fcfaf8]">
        <h1 class="brand-font text-5xl md:text-8xl font-bold uppercase tracking-tight">ZURAAN</h1>
        <p class="brand-font text-amber-700 tracking-[0.2em] text-[10px] md:text-xs uppercase italic px-4 text-center">Luxury Performance Fragrance</p>
    </header>

    <main class="container mx-auto px-2 md:px-8 py-8">
        <div id="product-list" class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-8">
            <p class="text-center col-span-full py-20 text-gray-400">Updating Collection...</p>
        </div>
    </main>

    <div id="universalModal" class="fixed inset-0 z-[100] hidden bg-black/70 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[1.5rem] p-6 md:p-8 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 text-2xl">&times;</button>
            <h2 id="modalTitle" class="brand-font text-xl mb-4 border-b pb-2 tracking-tight"></h2>
            <div id="modalContent" class="text-gray-700 text-sm leading-relaxed mb-6"></div>
            <button id="modalActionBtn" class="gold-btn w-full py-4 font-bold uppercase tracking-widest text-xs"></button>
        </div>
    </div>

    <footer class="bg-black text-white py-12 text-center">
        <p class="text-[9px] text-gray-500 uppercase tracking-widest italic">© 2026 Zuraan Luxury Fragrance | Bangladesh</p>
    </footer>

    <script>
        const MY_NUMBER = "8801876395185"; 
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSPO-no79a_tO4Kxqg-BxwLtn4Hp8AopALY87ht3IVldUlM2OGGzZg5sMWhoD8E6WAoaHHJKptNmeMz/pub?output=csv";

        let currentOrder = null;

        async function fetchInventory() {
            try {
                const response = await fetch(`${SHEET_CSV_URL}&cb=${Date.now()}`);
                const csvText = await response.text();
                
                // Smart CSV Parsing
                const rows = csvText.split(/\r?\n/).map(row => {
                    return row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g)?.map(val => val.replace(/^"|"$/g, '').trim());
                }).filter(r => r && r.length >= 5);

                const headers = rows[0].map(h => h.toLowerCase().trim());
                const dataRows = rows.slice(1);
                
                const list = document.getElementById('product-list');
                list.innerHTML = ''; 

                dataRows.forEach(col => {
                    const getCol = (name) => col[headers.indexOf(name)] || "";
                    const name = getCol('name');
                    const price = getCol('price');
                    const delivery = getCol('delivery');
                    const imgUrl = getCol('imgurl');
                    const details = getCol('details');

                    if(name) {
                        list.innerHTML += `
                            <div class="product-card">
                                <div class="h-44 md:h-72 overflow-hidden bg-gray-50">
                                    <img src="${imgUrl}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x500?text=Zuraan';">
                                </div>
                                <div class="p-3 md:p-6 flex-grow flex flex-col justify-between">
                                    <div class="text-center">
                                        <h3 class="brand-font text-[11px] md:text-lg font-bold mb-1 uppercase product-name">${name}</h3>
                                        <p class="text-amber-700 font-bold text-sm md:text-xl mb-4">${price} TK</p>
                                    </div>
                                    <div class="grid grid-cols-2 gap-2">
                                        <button onclick="showDetails(\`${name}\`, \`${details}\`)" class="details-btn py-2 text-[8px] md:text-[10px] font-bold uppercase">Details</button>
                                        <button onclick="openOrder(\`${name}\`, ${price}, ${delivery})" class="gold-btn py-2 text-[8px] md:text-[10px] font-bold uppercase">Buy</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });
            } catch (e) { console.error(e); }
        }

        function showDetails(name, info) {
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalContent').innerText = info || "Premium scent from Zuraan Collection.";
            const btn = document.getElementById('modalActionBtn');
            btn.innerText = "Close";
            btn.onclick = closeModal;
            document.getElementById('universalModal').classList.remove('hidden');
        }

        function openOrder(name, price, delivery) {
            const total = parseInt(price) + parseInt(delivery);
            currentOrder = { name, total };
            document.getElementById('modalTitle').innerText = "Order Summary";
            document.getElementById('modalContent').innerHTML = `
                <div class="space-y-2 py-4 border-t">
                    <div class="flex justify-between text-xs"><span>Item:</span><span>${name}</span></div>
                    <div class="flex justify-between font-black text-xl pt-4 text-amber-700"><span>TOTAL:</span><span>${total} TK</span></div>
                </div>
            `;
            const btn = document.getElementById('modalActionBtn');
            btn.innerText = "Order via WhatsApp";
            btn.onclick = () => window.open(`https://wa.me/${MY_NUMBER}?text=${encodeURIComponent('I want to order: ' + name + ' | Total: ' + total + ' TK')}`, '_blank');
            document.getElementById('universalModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('universalModal').classList.add('hidden'); }

        window.onload = fetchInventory;
    </script>
</body>
</html>
