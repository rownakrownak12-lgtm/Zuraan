<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuraan | Signature Scents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .brand-font { font-family: 'Cinzel', serif; }
        .product-card { transition: 0.4s; border-radius: 2.5rem; overflow: hidden; border: 1px solid #f3f4f6; background: #fff; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px -12px rgba(0,0,0,0.1); border-color: #C5A059; }
        .gold-btn { background: #0A0A0A; color: white; transition: 0.3s; border-radius: 1.5rem; text-align: center; }
        .gold-btn:hover { background: #C5A059; }
    </style>
</head>
<body class="bg-white">

    <nav class="fixed w-full z-50 top-0 bg-white/90 backdrop-blur-md border-b">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="./logo.png" class="h-10 w-10 rounded-full object-cover border" onerror="this.src='https://via.placeholder.com/40';">
                <span class="brand-font text-2xl font-bold tracking-tighter uppercase">Zuraan</span>
            </div>
            <div class="flex items-center space-x-5 text-xl text-gray-800">
                <a href="https://www.facebook.com/share/19vbLoMpfF/" target="_blank" class="hover:text-blue-600"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/zuraan_fragrance" target="_blank" class="hover:text-pink-600"><i class="fab fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@zuraan.perfume" target="_blank" class="hover:text-black"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
    </nav>

    <header class="pt-48 pb-20 text-center bg-[#fdfcfb]">
        <img src="./logo.png" class="w-24 mx-auto mb-6 rounded-full shadow-2xl border-2 border-white" onerror="this.src='https://via.placeholder.com/100';">
        <h1 class="brand-font text-6xl md:text-8xl font-bold mb-4 tracking-tighter">ZURAAN</h1>
        <p class="brand-font text-amber-700 tracking-[0.3em] uppercase italic text-sm">Elegance in every drop</p>
    </header>

    <section id="shop" class="py-24 container mx-auto px-6">
        <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12">
            <p class="text-center col-span-full py-20 text-gray-400 animate-pulse uppercase tracking-widest">Syncing with Admin Panel...</p>
        </div>
    </section>

    <footer class="bg-zinc-950 text-white py-20 text-center">
        <img src="./logo.png" class="h-16 w-16 rounded-full mx-auto mb-6 grayscale invert" onerror="this.src='https://via.placeholder.com/64';">
        <h2 class="brand-font text-3xl font-bold tracking-widest mb-10">ZURAAN</h2>
        <p class="text-[10px] text-gray-500 uppercase tracking-widest">© 2026 Zuraan Luxury | Developed by Rownak</p>
    </footer>

    <a href="https://wa.me/8801876395185" target="_blank" class="fixed bottom-8 right-8 bg-[#25D366] text-white p-4 rounded-full shadow-2xl z-50 hover:scale-110 transition">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <script>
        // --- 🟢 CONFIGURATION 🟢 ---
        const MY_NUMBER = "8801876395185"; 
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSPO-no79a_tO4Kxqg-BxwLtn4Hp8AopALY87ht3IVldUlM2OGGzZg5sMWhoD8E6WAoaHHJKptNmeMz/pub?output=csv";

        async function fetchProducts() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1).filter(r => r.trim() !== '');
                
                const list = document.getElementById('product-list');
                list.innerHTML = ''; 

                rows.forEach(row => {
                    const col = row.split(',').map(c => c.trim().replace(/^"(.*)"$/, '$1'));
                    if(col.length >= 5) {
                        let [id, name, price, delivery, imgUrl] = col;
                        
                        // --- 🛠 AUTO-FIX IMAGE LINK ---
                        let finalImg = imgUrl;
                        if(imgUrl.includes("ibb.co") && !imgUrl.includes("i.ibb.co")) {
                            const parts = imgUrl.split('/');
                            const imgId = parts[parts.length - 1];
                            finalImg = `https://i.ibb.co/${imgId}/image.jpg`;
                        } else if (!imgUrl.startsWith("http")) {
                            finalImg = "https://via.placeholder.com/400x500?text=Zuraan";
                        }
                        // ------------------------------

                        const total = (parseInt(price) || 0) + (parseInt(delivery) || 0);
                        const msg = encodeURIComponent(
                            `New Order - ZURAAN\n` +
                            `--------------------------\n` +
                            `Product: ${name}\n` +
                            `Price: ${price} TK\n` +
                            `Delivery: ${delivery} TK\n` +
                            `Total: ${total} TK`
                        );

                        list.innerHTML += `
                            <div class="product-card">
                                <div class="h-80 overflow-hidden bg-gray-50">
                                    <img src="${finalImg}" class="w-full h-full object-cover transition duration-700 hover:scale-110" 
                                         onerror="this.src='https://via.placeholder.com/400x500?text=Image+Error';">
                                </div>
                                <div class="p-8 text-center">
                                    <h3 class="brand-font text-xl font-bold mb-2">${name}</h3>
                                    <p class="text-amber-700 font-black text-2xl mb-1">${price} TK</p>
                                    <p class="text-[9px] text-gray-400 uppercase tracking-widest mb-6">+ ${delivery} TK Delivery</p>
                                    <a href="https://wa.me/${MY_NUMBER}?text=${msg}" target="_blank" 
                                       class="gold-btn w-full block py-4 font-bold text-[10px] uppercase tracking-widest shadow-lg">
                                       Order via WhatsApp
                                    </a>
                                </div>
                            </div>
                        `;
                    }
                });
            } catch (e) {
                console.error("Database Connection Error:", e);
                document.getElementById('product-list').innerHTML = "<p class='col-span-full text-center'>Refreshing database...</p>";
            }
        }

        fetchProducts();
    </script>
</body>
</html>
